name: DevSecOps & SOC2 Compliance Pipeline

on:
  push:
    branches: [ "main", "develop", "production" ]
  pull_request:
    branches: [ "main", "develop", "production" ]
  schedule:
    # Scan hebdomadaire (Exigence SOC 2 CC7.1)
    - cron: '0 3 * * 1'

jobs:
  software-composition-analysis:
    name: SCA & Dépendances
    runs-on: ubuntu-latest
    strategy:
      matrix:
        directory: [backend, frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './${{ matrix.directory }}/package-lock.json'

      - name: Install Dependencies
        working-directory: ./${{ matrix.directory }}
        run: npm ci --ignore-scripts

      - name: Run NPM Audit (High/Critical only)
        working-directory: ./${{ matrix.directory }}
        run: npm audit --audit-level=high

      # Décommenter et ajouter la clé secrète SNYK_TOKEN dans GitHub Secrets
      # - name: Run Snyk Security Scan
      #   uses: snyk/actions/node@master
      #   env:
      #     SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      #   with:
      #     args: --all-projects --severity-threshold=high

  container-security:
    name: Container Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Backend Docker Image
        working-directory: ./backend
        run: docker build -t madrassa-backend:local-test .

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'madrassa-backend:local-test'
          format: 'table'
          exit-code: '1' # Fait échouer la CI si une faille est trouvée
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  secrets-scanning:
    name: Secrets & Credentials Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog (Secret Scanning)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
